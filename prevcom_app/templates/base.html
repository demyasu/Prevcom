<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREVCOM 2026 - Estudo Inteligente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                <i class="bi bi-mortarboard-fill"></i> PREVCOM 2026
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-house"></i> Início</a></li>
                    <li class="nav-item"><a class="nav-link" href="/simulado"><i class="bi bi-pencil-square"></i> Simulados</a></li>
                    <li class="nav-item"><a class="nav-link" href="/flashcards"><i class="bi bi-card-checklist"></i> Flashcards</a></li>
                    <li class="nav-item"><a class="nav-link" href="/edital"><i class="bi bi-file-text"></i> Edital</a></li>
                    <li class="nav-item"><a class="nav-link" href="/estatisticas"><i class="bi bi-graph-up"></i> Estatísticas</a></li>
                    <li class="nav-item"><a class="nav-link" href="/conceitos"><i class="bi bi-book"></i> Conceitos</a></li>
                    <li class="nav-item"><a class="nav-link" href="/provas-anteriores"><i class="bi bi-archive"></i> Provas</a></li>
                </ul>
                <span class="navbar-text">
                    <i class="bi bi-clock"></i> <span id="dias-restantes">{{ dias_restantes }}</span> dias para a prova
                </span>
            </div>
        </div>
    </nav>

    <main class="container mt-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="mt-5 py-3 text-center text-muted border-top">
        <div class="container">
            <small>PREVCOM SP 2026 - Analista de Tecnologia | Prova: 13/09/2026 | Banca: VUNESP</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
