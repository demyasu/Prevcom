{% extends "base.html" %}
{% block content %}
<h2><i class="bi bi-file-text"></i> Conteúdo Programático</h2>
<p class="text-muted">PREVCOM SP 2026 - Analista de Tecnologia - Edital completo</p>

<div class="card mb-4">
    <div class="card-header bg-dark text-white">
        <i class="bi bi-info-circle"></i> Resumo da Prova
    </div>
    <div class="card-body" id="info-exame">
        <div class="spinner-border"></div>
    </div>
</div>

<div id="conteudo-areas"></div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    fetch(BASE_URL + '/api/edital')
        .then(r => r.json())
        .then(data => {
            document.getElementById('info-exame').innerHTML = `
                <div class="row">
                    <div class="col-md-3"><strong>Total de Questões:</strong> ${data.exame.total_questoes}</div>
                    <div class="col-md-3"><strong>Data:</strong> ${data.exame.data_prova}</div>
                    <div class="col-md-3"><strong>Duração:</strong> ${data.exame.duracao}</div>
                    <div class="col-md-3"><strong>Nota Mínima:</strong> ${data.exame.nota_minima} pontos</div>
                </div>
                <hr>
                <p><strong>Banca:</strong> ${data.exame.banca}</p>
                <p><strong>Cargo:</strong> ${data.exame.cargo}</p>
                <p><strong>Vagas:</strong> ${data.exame.vagas}</p>
                <p class="mb-0"><small>${data.exame.descricao}</small></p>
            `;

            const container = document.getElementById('conteudo-areas');
            container.innerHTML = data.areas.map(area => `
                <div class="card mb-3">
                    <div class="card-header bg-dark text-white d-flex justify-content-between">
                        <span><strong>${area.nome}</strong></span>
                        <span class="badge bg-info">${area.questoes} questões</span>
                    </div>
                    <div class="card-body">
                        ${area.topicos.map(t => `
                            <div class="mb-3">
                                <h6 class="fw-bold">${t.nome}</h6>
                                ${t.sub_topicos ? `
                                    <ul class="list-unstyled ms-3">
                                        ${t.sub_topicos.map(st => `<li><i class="bi bi-dot"></i> ${st}</li>`).join('')}
                                    </ul>
                                ` : ''}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        });
});
</script>
{% endblock %}
