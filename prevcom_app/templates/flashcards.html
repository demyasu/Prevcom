{% extends "base.html" %}
{% block content %}
<div class="row mb-3">
    <div class="col-12 d-flex justify-content-between align-items-center">
        <h2><i class="bi bi-card-checklist"></i> Flashcards</h2>
        <button class="btn btn-primary" onclick="toggleForm()"><i class="bi bi-plus-lg"></i> Novo Card</button>
    </div>
</div>

<div class="card mb-4 d-none" id="form-card">
    <div class="card-body">
        <h5 class="card-title">Novo Flashcard</h5>
        <div class="row g-3">
            <div class="col-md-5">
                <label class="form-label">Frente (conceito)</label>
                <input class="form-control" id="frente-input" placeholder="Ex: O que é ITIL?">
            </div>
            <div class="col-md-5">
                <label class="form-label">Verso (definição)</label>
                <textarea class="form-control" id="verso-input" rows="2" placeholder="Ex: ITIL é um conjunto de boas práticas..."></textarea>
            </div>
            <div class="col-md-2">
                <label class="form-label">Disciplina</label>
                <select class="form-select" id="disciplina-input">
                    <option value="Lingua Portuguesa">Português</option>
                    <option value="Etica e Integridade">Ética</option>
                    <option value="Raciocinio Logico e Analitico">R. Lógico</option>
                    <option value="Previdencia Complementar no Brasil">Previdência</option>
                    <option value="Conhecimentos Especificos em Tecnologia" selected>Tecnologia</option>
                </select>
            </div>
        </div>
        <button class="btn btn-success mt-2" onclick="adicionarCard()"><i class="bi bi-save"></i> Salvar</button>
    </div>
</div>

<div class="row mb-3">
    <div class="col-md-6 mx-auto">
        <div class="card flashcard shadow-lg" onclick="virarCard()" id="flashcard-card">
            <div class="card-body d-flex align-items-center justify-content-center" style="min-height: 280px;">
                <div id="card-frente" class="text-center fs-4"></div>
                <div id="card-verso" class="text-center fs-4 d-none"></div>
            </div>
        </div>
        <div class="text-center mt-2">
            <span id="card-progresso" class="text-muted">Carregando...</span>
            <span id="card-dificuldade" class="ms-3"></span>
        </div>
    </div>
</div>

<div class="d-flex justify-content-center gap-3 mb-4">
    <button class="btn btn-outline-danger" onclick="avaliarCard(false)" id="btn-errei" disabled>
        <i class="bi bi-x-circle"></i> Ainda não sei
    </button>
    <button class="btn btn-outline-warning" onclick="virarCard()" id="btn-virar">
        <i class="bi bi-arrow-repeat"></i> Virar
    </button>
    <button class="btn btn-outline-success" onclick="avaliarCard(true)" id="btn-acertei" disabled>
        <i class="bi bi-check-circle"></i> Já sei!
    </button>
</div>

<div class="d-flex justify-content-center gap-2 mb-4 flex-wrap">
    <button class="btn btn-secondary" onclick="embaralhar()"><i class="bi bi-shuffle"></i> Embaralhar</button>
    <a href="/api/flashcards/exportar/xlsx" class="btn btn-success"><i class="bi bi-file-earmark-excel"></i> Exportar XLSX</a>
    <a href="/api/flashcards/exportar/pdf" class="btn btn-danger"><i class="bi bi-file-earmark-pdf"></i> Exportar PDF</a>
</div>

<div class="card mt-4">
    <div class="card-header bg-dark text-white"><i class="bi bi-funnel"></i> Filtrar por Disciplina</div>
    <div class="card-body">
        <div class="d-flex flex-wrap gap-2" id="filtros-disciplina">
            <button class="btn btn-sm btn-primary filtro-disc active" data-disc="todas" onclick="filtrarCards('todas')">Todas <span class="badge bg-light text-dark ms-1" id="count-todas">0</span></button>
            <button class="btn btn-sm btn-outline-primary filtro-disc" data-disc="Conhecimentos Especificos em Tecnologia" onclick="filtrarCards(this.dataset.disc)">Tecnologia <span class="badge bg-secondary ms-1" id="count-Conhecimentos Especificos em Tecnologia">0</span></button>
            <button class="btn btn-sm btn-outline-primary filtro-disc" data-disc="Lingua Portuguesa" onclick="filtrarCards(this.dataset.disc)">Português <span class="badge bg-secondary ms-1" id="count-Lingua Portuguesa">0</span></button>
            <button class="btn btn-sm btn-outline-primary filtro-disc" data-disc="Raciocinio Logico e Analitico" onclick="filtrarCards(this.dataset.disc)">R. Lógico <span class="badge bg-secondary ms-1" id="count-Raciocinio Logico e Analitico">0</span></button>
            <button class="btn btn-sm btn-outline-primary filtro-disc" data-disc="Previdencia Complementar no Brasil" onclick="filtrarCards(this.dataset.disc)">Previdência <span class="badge bg-secondary ms-1" id="count-Previdencia Complementar no Brasil">0</span></button>
            <button class="btn btn-sm btn-outline-primary filtro-disc" data-disc="Etica e Integridade" onclick="filtrarCards(this.dataset.disc)">Ética <span class="badge bg-secondary ms-1" id="count-Etica e Integridade">0</span></button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let cards = [];
let cardAtual = 0;
let virado = false;
let carregando = false;

document.addEventListener('DOMContentLoaded', () => {
    carregarCards();
    carregarContagens();
});

function carregarContagens() {
    fetch('/api/flashcards/contagem')
        .then(r => r.json())
        .then(data => {
            let total = 0;
            for (const [disc, count] of Object.entries(data)) {
                const el = document.getElementById('count-' + disc);
                if (el) { el.textContent = count; total += count; }
            }
            const todasEl = document.getElementById('count-todas');
            if (todasEl) todasEl.textContent = total;
        })
        .catch(() => {});
}

function carregarCards() {
    fetch('/api/flashcards')
        .then(r => { if (!r.ok) throw new Error('Erro ' + r.status); return r.json(); })
        .then(data => {
            cards = data;
            cardAtual = 0;
            mostrarCard();
        })
        .catch(err => {
            document.getElementById('card-frente').textContent = 'Erro: ' + err.message;
            document.getElementById('card-progresso').textContent = '0 cards';
        });
}

function mostrarCard() {
    if (!cards.length) {
        document.getElementById('card-frente').textContent = 'Nenhum flashcard. Crie um novo!';
        document.getElementById('card-verso').classList.add('d-none');
        document.getElementById('card-frente').classList.remove('d-none');
        document.getElementById('card-progresso').textContent = '0 cards';
        document.getElementById('card-dificuldade').innerHTML = '';
        atualizarBotoes(false);
        return;
    }
    const c = cards[cardAtual];
    document.getElementById('card-frente').textContent = c.frente;
    document.getElementById('card-verso').textContent = c.verso;
    document.getElementById('card-verso').classList.add('d-none');
    document.getElementById('card-frente').classList.remove('d-none');
    document.getElementById('card-progresso').textContent = `Card ${cardAtual + 1}/${cards.length} | ${c.disciplina}`;

    const diffEl = document.getElementById('card-dificuldade');
    if (diffEl) {
        const diff = c.indice_dificuldade || 1;
        const labels = {1: 'Fácil', 2: 'Médio', 3: 'Médio+', 4: 'Difícil', 5: 'Muito Difícil'};
        const cor = diff >= 4 ? 'danger' : diff >= 3 ? 'warning' : 'success';
        const stats = c.revisoes > 0 ? `(${c.acertos}A/${c.erros}E)` : '(novo)';
        diffEl.innerHTML = `<span class="badge bg-${cor}">${labels[diff] || 'Novo'} ${stats}</span>`;
    }

    virado = false;
    atualizarBotoes(false);
}

function atualizarBotoes(v) {
    document.getElementById('btn-acertei').disabled = !v;
    document.getElementById('btn-errei').disabled = !v;
}

function virarCard() {
    if (!cards.length || carregando) return;
    virado = !virado;
    document.getElementById('card-frente').classList.toggle('d-none', virado);
    document.getElementById('card-verso').classList.toggle('d-none', !virado);
    atualizarBotoes(virado);
}

function avaliarCard(acertou) {
    if (!cards.length || carregando) return;
    if (!virado) { virarCard(); return; }
    const c = cards[cardAtual];
    carregando = true;
    fetch('/api/flashcards/revisar', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({id: c.id, acertou: !!acertou})
    })
    .then(r => { if (!r.ok) throw new Error('Erro ' + r.status); return r.json(); })
    .then(() => {
        cardAtual = (cardAtual + 1) % cards.length;
        mostrarCard();
        carregando = false;
    })
    .catch(err => { alert('Erro: ' + err.message); carregando = false; });
}

function embaralhar() {
    for (let i = cards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [cards[i], cards[j]] = [cards[j], cards[i]];
    }
    cardAtual = 0;
    mostrarCard();
}

function toggleForm() {
    document.getElementById('form-card').classList.toggle('d-none');
}

function adicionarCard() {
    const frente = document.getElementById('frente-input').value.trim();
    const verso = document.getElementById('verso-input').value.trim();
    const disc = document.getElementById('disciplina-input').value;
    if (!frente || !verso) { alert('Preencha todos os campos.'); return; }
    fetch('/api/flashcards/adicionar', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({frente, verso, disciplina: disc})
    })
    .then(r => { if (!r.ok) throw new Error('Erro ' + r.status); return r.json(); })
    .then(() => {
        document.getElementById('frente-input').value = '';
        document.getElementById('verso-input').value = '';
        toggleForm();
        carregarCards();
        carregarContagens();
    })
    .catch(err => alert('Erro: ' + err.message));
}

function filtrarCards(disc) {
    document.querySelectorAll('.filtro-disc').forEach(b =>
        b.className = `btn btn-sm ${b.dataset.disc === disc ? 'btn-primary' : 'btn-outline-primary'} filtro-disc`
    );
    const url = disc === 'todas' ? '/api/flashcards' : `/api/flashcards?disciplina=${encodeURIComponent(disc)}`;
    fetch(url)
        .then(r => { if (!r.ok) throw new Error('Erro ' + r.status); return r.json(); })
        .then(data => { cards = data; cardAtual = 0; mostrarCard(); })
        .catch(err => alert('Erro: ' + err.message));
}
</script>
{% endblock %}
